# Single-node FoundationDB for local development.
#
# Mirrors the upstream bluesky-social/fdb-docker layout: bridge networking
# with a published port, so the same compose file works on Linux and macOS
# (Docker Desktop with Rosetta). The kvdb server and fdbcli on the host
# reach FDB at 127.0.0.1:4500 via the port mapping.
#
# The pinned image auto-runs `configure new single ssd` on first boot,
# so no separate initialization step is needed.

services:
  fdb:
    image: ghcr.io/bluesky-social/fdb-docker:sha-ea0bf12
    container_name: kvdb-fdb
    environment:
      - FDB_PORT=4500
    ports:
      - "4500:4500"
    tmpfs:
      - /var/fdb/data
    healthcheck:
      test: ["CMD-SHELL", "fdbcli -C /var/fdb/cluster/fdb.cluster --exec 'status minimal' | grep -q available"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
