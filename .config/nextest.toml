[store]
dir = "target/nextest"

[profile.default]
retries = 2
fail-fast = false
slow-timeout = { period = "10s", terminate-after = 2 }

# FDB directory layer operations conflict under high concurrency, so
# storage integration tests must run one at a time.
[[profile.default.overrides]]
filter = 'binary(storage)'
test-group = 'serial-fdb'

[test-groups.serial-fdb]
max-threads = 1

[profile.ci]
retries = 2
fail-fast = true

[[profile.ci.overrides]]
filter = 'binary(storage)'
test-group = 'serial-fdb'
